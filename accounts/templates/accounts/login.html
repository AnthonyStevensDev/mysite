{% load static %}
<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'myapp/style.css' %}" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              dark: {
                950: "#050508",
                900: "#0a0a0f",
                800: "#0f0f18",
                700: "#151522",
                600: "#1a1a2e",
              },
              accent: {
                DEFAULT: "#00d4aa",
                light: "#33e0be",
                dark: "#00a888",
              },
              surface: {
                DEFAULT: "rgba(255, 255, 255, 0.03)",
                border: "rgba(255, 255, 255, 0.06)",
              },
            },
          },
        },
      };
    </script>
  </head>

  <body
    class="bg-dark-950 text-gray-300 font-sans antialiased min-h-screen flex items-center justify-center px-4"
  >
    <div class="w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="/" class="inline-flex items-center gap-2 group">
          <div
            class="w-10 h-10 rounded-xl bg-accent/10 border border-accent/30 flex items-center justify-center group-hover:bg-accent/20 transition-all duration-300"
          >
            <span class="text-accent font-mono font-semibold">&lt;/&gt;</span>
          </div>
          <span class="text-white font-semibold text-xl tracking-tight"
            >Anthony <span class="text-accent">Stevens</span></span
          >
        </a>
        <h1 class="text-2xl font-bold text-white mt-6 mb-2">Welcome back</h1>
        <p class="text-gray-400 text-sm">Sign in to access the AI tools</p>
      </div>

      <!-- Messages -->
      {% if messages %} {% for message in messages %}
      <div
        class="mb-4 p-4 rounded-xl {% if message.tags == 'error' %}bg-red-500/10 border border-red-500/20 text-red-400{% else %}bg-accent/10 border border-accent/20 text-accent{% endif %} text-sm"
      >
        {{ message }}
      </div>
      {% endfor %} {% endif %}

      <!-- Form -->
      <div class="p-8 rounded-2xl bg-surface border border-surface-border">
        <form method="POST">
          {% csrf_token %}

          <div class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2"
                >Username</label
              >
              <input
                type="text"
                name="username"
                required
                placeholder="Your username"
                class="w-full px-4 py-3 rounded-xl bg-dark-800 border border-white/10 text-white placeholder-gray-600 focus:outline-none focus:border-accent/50 transition-colors duration-200"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2"
                >Password</label
              >
              <input
                type="password"
                name="password"
                required
                placeholder="Your password"
                class="w-full px-4 py-3 rounded-xl bg-dark-800 border border-white/10 text-white placeholder-gray-600 focus:outline-none focus:border-accent/50 transition-colors duration-200"
              />
            </div>

            <button
              type="submit"
              class="w-full px-8 py-4 rounded-xl bg-accent text-dark-950 font-semibold text-base hover:bg-accent-light transition-all duration-300 shadow-lg shadow-accent/25"
            >
              Sign In
            </button>
          </div>
        </form>
      </div>

      <!-- Register link -->
      <p class="text-center text-gray-500 text-sm mt-6">
        Don't have an account?
        <a
          href="/accounts/register"
          class="text-accent hover:text-accent-light transition-colors duration-300"
          >Create one free</a
        >
      </p>

      <p class="text-center mt-4">
        <a
          href="/"
          class="text-gray-600 text-sm hover:text-gray-400 transition-colors duration-300"
          >← Back to portfolio</a
        >
      </p>
    </div>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
